<div class="card mb-4 mx-3">
  <div class="card-header" style="background: none; border-bottom: none;">
    <h5 class="fw-bold mb-0">Quantitative Performance</h5>
  </div>
  <div class="card-body">
    <div class="row">
      <!-- Pie Chart -->
      <div class="col-md-6" *ngIf="pieChartData.length>0">
        <div class="chart-section">
          <!-- <h6 class="text-center mb-3">Task Distribution</h6> -->
          <div class="chart-container" [class.disabled-chart]="noDataPieChart">
            <ngx-charts-pie-chart
              [results]="pieChartData"
              [scheme]="pieChartColorScheme"
              [legend]="true"
              [legendTitle]="'Tasks'"
              [labels]="true"
              [doughnut]="false"
              [gradient]="true"
              [tooltipDisabled]="noDataPieChart">
            </ngx-charts-pie-chart>
          </div>
        </div>
        <div *ngIf="noDataPieChart" class="overlay-text">
          No Data Available
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="col-md-6" *ngIf="barChartData.length>0">
        <div class="chart-section">
          <!-- <h6 class="text-center mb-3">Monthly Performance Score</h6> -->
          <div class="chart-container" [class.disabled-chart]="noDataBarChart">
            <ngx-charts-bar-vertical
              [results]="barChartData"
              [scheme]="barChartColorScheme"
              [xAxis]="true"
              [yAxis]="true"
              [legend]="false"
              [showXAxisLabel]="true"
              [showYAxisLabel]="true"
              [yAxisLabel]="'Score'"
              [gradient]="true"
              [roundDomains]="true"
              [noBarWhenZero]="true"
              [tooltipDisabled]="noDataBarChart">
            </ngx-charts-bar-vertical>
            <!-- [xAxisLabel]="'Month'" -->
          </div>
        </div>
        <div *ngIf="noDataBarChart" class="overlay-text">
          No Data Available
        </div>
      </div>
    </div>
  </div>
</div>
