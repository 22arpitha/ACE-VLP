<div class="container-wrapper settings-main-content tickets px-0">

  <section class="settings-table-bg px-3">

    <!-- ================= TOP CONTROLS ROW ================= -->

    <div class="row mx-0 my-1 px-0 py-2">

      <!-- Search -->
      <div class="col-12 col-md-4 col-lg-6 search-div px-0">
        <input type="search" class="form-control p-2 sizeinput" [(ngModel)]="filter.issue" (input)="onFilterChange()"
          placeholder="Search by Issue" autocomplete="off">
        <i *ngIf="!filter.issue" class="bi bi-search" id="search-icon-tab"></i>
      </div>

      <!-- Column Settings -->
      <!-- <div class="col-12 col-md-4 col-lg-3 px-0 text-start align-self-end">

        <button mat-button [matMenuTriggerFor]="columnMenu">
          <i class="bi bi-gear"></i> Column settings
        </button>

        <mat-menu #columnMenu="matMenu">
          <div class="row px-3 py-2">
            <mat-checkbox *ngFor="let col of columns"
                          [(ngModel)]="col.visible">
              {{ col.label }}
            </mat-checkbox>
          </div>
        </mat-menu>

      </div> -->

      <!-- Create Button -->
      <div class="col-12 col-md-12 col-lg-6 text-end px-0">

        <button mat-raised-button class="create-btn" (click)="raiseNewTicket()">
          <mat-icon>add</mat-icon>
          Raise Ticket
        </button>

      </div>

    </div>

    <!-- ================= TABLE ================= -->

    <div class="row mx-1 my-2 px-0 table-wrapper">

      <div class="col-12 px-0">

        <table class="table table-hover table-list ticket-table">


          <thead>
            <tr>

              <!-- Ticket Number -->
              <th class="col-ticket" *ngIf="isColumnVisible('ticketNumber')">
                Ticket #
                <i class="bi bi-arrow-down" (click)="onSort('ticketNumber')"></i>
              </th>

              <!-- Raised Date -->
              <th class="col-raised-date" *ngIf="isColumnVisible('ticketRaisedDate')">
                Raised Date

                <button mat-icon-button (click)="raisedPicker.open()" *ngIf="!filter.ticketRaisedDateFrom">
                  <i class="bi bi-calendar"></i>
                </button>

                <button mat-icon-button *ngIf="filter.ticketRaisedDateFrom" (click)="clearDateFilter()">
                  <i class="bi bi-x-circle"></i>
                </button>

                <mat-form-field class="opacity-0 position-absolute date-picker-input">
                  <mat-date-range-input [rangePicker]="raisedPicker">
                    <input matStartDate [(ngModel)]="filter.ticketRaisedDateFrom" (dateChange)="onFilterChange()" />
                    <input matEndDate [(ngModel)]="filter.ticketRaisedDateTo" (dateChange)="onFilterChange()" />
                  </mat-date-range-input>
                  <mat-date-range-picker #raisedPicker></mat-date-range-picker>
                </mat-form-field>
              </th>

              <!-- Issue -->
              <th class="col-issue" *ngIf="isColumnVisible('issue')">
                Issue
                <i class="bi bi-arrow-down" (click)="onSort('issue')"></i>
              </th>

              <!-- Status -->
              <th class="col-status" *ngIf="isColumnVisible('status')">
                Status
                <i class="bi bi-arrow-down" (click)="onSort('status')"></i>

                <button mat-icon-button [matMenuTriggerFor]="statusFilterMenu">
                  <i class="bi bi-funnel"></i>
                </button>

                <mat-menu #statusFilterMenu="matMenu">
                  <mat-selection-list [(ngModel)]="filter.status" (ngModelChange)="onFilterChange()">
                    <mat-list-option *ngFor="let s of ticketStatuses" [value]="s">
                      {{ s }}
                    </mat-list-option>
                  </mat-selection-list>
                </mat-menu>

                <button mat-icon-button *ngIf="filter.status" (click)="clearFilters()">
                  <i class="bi bi-x-circle"></i>
                </button>
              </th>

              <!-- Status Date -->
              <th class="col-status-date" *ngIf="isColumnVisible('statusDate')">
                Status Date
                <i class="bi bi-arrow-down" (click)="onSort('statusDate')"></i>

              </th>

            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let t of filteredTickets | paginate: {
                            itemsPerPage: tableSize,
                            currentPage: page,
                            totalItems: filteredTickets.length
                          }" >

              <td class="col-ticket" *ngIf="isColumnVisible('ticketNumber')" >
                {{ t.ticketNumber }}
              </td>

              <td class="col-raised-date" *ngIf="isColumnVisible('ticketRaisedDate')">
                {{ t.ticketRaisedDate | date:'dd-MM-yyyy' }}
              </td>

              <td  class="col-issue" *ngIf="isColumnVisible('issue')" (click)="openTicket(t)">
                {{ truncateText(t.issue, 80) }}
              </td>
              <!-- 
              <td *ngIf="isColumnVisible('status')">
                <mat-chip [ngClass]="getStatusClass(t.status)">
                  {{ t.status }}
                </mat-chip>
              </td> -->


              <td class="col-status" *ngIf="isColumnVisible('status')" class="status-col">

                <mat-select panelClass="custom-select-dropdown" class="mat-select-table editable-cell"
                  [(ngModel)]="t.status" (selectionChange)="onStatusChange(t, $event)">

                  <mat-option *ngFor="let status of ticketStatuses" [value]="status"
                    [disabled]="ticketStatusValidation(t, status)">

                    {{ status }}

                  </mat-option>

                </mat-select>

              </td>


              <td class="col-status-date" *ngIf="isColumnVisible('statusDate')">
                {{ t.statusDate | date:'dd-MM-yyyy' }}
              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

    <!-- No Records -->
    <div class="row mx-1 my-2 px-0" *ngIf="filteredTickets?.length === 0">
      <app-generic-norecards></app-generic-norecards>
    </div>

  </section>

  <!-- ================= PAGINATION ================= -->

  <div class="row mx-0 px-3" *ngIf="filteredTickets?.length > 0">
    <div class="col-12 px-0">

      <div class="pagination-container">

        <pagination-controls previousLabel="Prev" nextLabel="Next" (pageChange)="page = $event">
        </pagination-controls>

        <div class="items-per-page-container">

          <div>Items per page</div>

          <mat-select [(ngModel)]="tableSize" placeholder="10" class="page-size">

            <mat-option *ngFor="let size of tableSizes" [value]="size">
              {{ size }}
            </mat-option>

          </mat-select>

        </div>

      </div>

    </div>
  </div>

</div>
