<mat-form-field appearance="outline" class="w-100 custom-mat-form-field">
  <mat-label>Select Employee</mat-label>

  <!-- Multi-select mode: keep existing mat-select -->
  <ng-container *ngIf="multiple">
    <mat-select [(ngModel)]="selectedEmployeeVal" [ngModelOptions]="{standalone: true}" [disableOptionCentering]="true" [disabled]="user_role_name==='Accountant'? true : false"
      autocomplete="off" placeholder="Select" panelClass="custom-select-panel" [multiple]="multiple" (selectionChange)="onSelectedEmployee($event)" (openedChange)="onDropdownOpened($event, 'employee')">
      
      <!-- Search input field inside the panel -->
      <div class="mat-select-search-wrapper d-flex">
        <input matInput [(ngModel)]="dropdownState.employee.search" (ngModelChange)="onSearch('employee', $event)" [ngModelOptions]="{standalone: true}" placeholder="Search Employee" class="mat-select-search">
        <mat-icon class="search-icon" *ngIf="!dropdownState.employee.search">search</mat-icon>
        <mat-icon class="search-icon" *ngIf="dropdownState.employee.search" type="button" (click)="clearSearchDropD('employee')">close</mat-icon>
      </div>

      <mat-option hidden disabled></mat-option>
      <mat-option *ngFor="let item of getOptionsWithSelectedOnTop('employee')" [value]="item?.user_id">
          {{item?.user__full_name}}
      </mat-option>
    </mat-select>
  </ng-container>

  <!-- Single-select mode: mat-autocomplete -->
  <ng-container *ngIf="!multiple">
    <input matInput [formControl]="employeeDisplayControl"
        [matAutocomplete]="employeeAuto"
        placeholder="Search Employee"
        (focus)="onEmployeeFocus()"
        (blur)="onEmployeeBlur()">
    <mat-autocomplete #employeeAuto="matAutocomplete"
        [displayWith]="displayEmployeeFn"
        (optionSelected)="onEmployeeOptionSelected($event)">
        <mat-option *ngFor="let item of dropdownState.employee.list" [value]="item"
            (mousedown)="$event.preventDefault()">
            {{item?.user__full_name}}
        </mat-option>
        <mat-option *ngIf="dropdownState.employee.loading" disabled>Loading...</mat-option>
        <mat-option *ngIf="!dropdownState.employee.loading && !dropdownState.employee.list.length" disabled>
            No results found
        </mat-option>
    </mat-autocomplete>
  </ng-container>
</mat-form-field>
